<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Roadmap - Wallpaper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#060610;--surface:rgba(12,12,26,0.72);--border:rgba(30,30,60,0.55);--text:#dde1f0;--muted:#484870;--muted2:#6868a0;--c0:#00e5ff;--c1:#7c3aed;--c2:#ec4899;--c3:#f59e0b;--c4:#00ff9d;--c5:#f97316}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'DM Mono',monospace}
.bg-gradient{position:fixed;inset:0;pointer-events:none;background:radial-gradient(ellipse 80% 50% at 20% 30%,rgba(0,229,255,.05) 0%,transparent 60%),radial-gradient(ellipse 60% 40% at 80% 70%,rgba(124,58,237,.06) 0%,transparent 60%),#060610}
.bg-grid{position:fixed;inset:0;pointer-events:none;background-image:linear-gradient(rgba(0,229,255,.028) 1px,transparent 1px),linear-gradient(90deg,rgba(0,229,255,.028) 1px,transparent 1px);background-size:56px 56px;animation:gridshift 24s ease-in-out infinite alternate}
@keyframes gridshift{0%{background-position:0 0}100%{background-position:28px 28px}}
.bg-scan{position:fixed;inset:0;pointer-events:none;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,.025) 2px,rgba(0,0,0,.025) 4px)}
.particle{position:fixed;border-radius:50%;pointer-events:none;animation:floatup linear infinite}
@keyframes floatup{0%{transform:translateY(105vh) scale(0);opacity:0}5%{opacity:1}90%{opacity:.3}100%{transform:translateY(-5vh) scale(1);opacity:0}}
.wallpaper{width:100vw;height:calc(100vh - 48px);display:grid;grid-template-rows:auto 1fr auto;padding:18px 28px 14px;gap:12px;position:relative;z-index:10;overflow:hidden}
.top-bar{display:flex;align-items:center;justify-content:space-between;gap:20px}
.logo-name{font-family:'Cabinet Grotesk',sans-serif;font-size:12px;font-weight:900;letter-spacing:.06em;color:var(--muted2);text-transform:uppercase}
.logo-name span{color:var(--c0)}
.center-stat{text-align:center;position:relative}
.pct-glow{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);width:130px;height:130px;border-radius:50%;background:radial-gradient(circle,rgba(0,255,157,.08) 0%,transparent 70%);pointer-events:none}
.overall-pct{font-family:'Cabinet Grotesk',sans-serif;font-size:clamp(38px,5.5vw,68px);font-weight:900;letter-spacing:-.05em;line-height:1;color:var(--c4);text-shadow:0 0 60px rgba(0,255,157,.4),0 0 120px rgba(0,255,157,.15);position:relative;z-index:1}
.overall-label{font-size:8px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-top:3px}
.top-stats{display:flex;gap:10px}
.tstat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:8px 14px;text-align:right;backdrop-filter:blur(12px)}
.tstat-val{font-family:'Cabinet Grotesk',sans-serif;font-size:19px;font-weight:800;line-height:1}
.tstat-label{font-size:7px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}
.sections-row{display:grid;grid-template-columns:repeat(6,1fr);gap:10px;align-items:stretch;height:100%;min-height:0}
.sec-card{background:var(--surface);border:1px solid var(--border);border-radius:14px;padding:12px 11px 10px;backdrop-filter:blur(16px);display:flex;flex-direction:column;gap:6px;position:relative;overflow:hidden;transition:border-color .5s;height:100%}
.sec-accent{position:absolute;left:0;top:8px;bottom:8px;width:2px;border-radius:1px}
.sec-icon{font-size:20px;padding-left:10px;line-height:1}
.sec-tag{font-size:7px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;padding-left:10px}
.sec-name-label{font-family:'Cabinet Grotesk',sans-serif;font-size:clamp(10px,.9vw,12px);font-weight:700;color:var(--muted2);padding-left:10px;line-height:1.2}
.sec-pct{font-family:'Cabinet Grotesk',sans-serif;font-size:clamp(28px,3.2vw,42px);font-weight:900;line-height:1;padding-left:10px;margin-top:auto;margin-bottom:4px}
.seg-track{display:flex;gap:2px;padding:0 10px}
.seg{height:3px;border-radius:2px;flex:1;transition:background .5s}
.topic-subs-wrap{padding:0 10px;display:flex;flex-direction:column;gap:3px;overflow:hidden;flex:1}
.topic-sub-row{display:flex;gap:2px;align-items:center}
.topic-name-tiny{font-size:7px;color:var(--muted);width:60px;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sub-pips{display:flex;gap:2px}
.spip{width:10px;height:4px;border-radius:1px;transition:background .4s}
.sec-footer{display:flex;justify-content:space-between;padding:0 10px;font-size:7px;color:var(--muted)}
.bottom-row{display:grid;grid-template-columns:1fr auto;gap:12px;align-items:end}
.heatmap-card{background:var(--surface);border:1px solid var(--border);border-radius:12px;padding:10px 16px;backdrop-filter:blur(16px)}
.hm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:10px}
.hm-title{font-size:7px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.hm-bars{display:flex;gap:7px;align-items:flex-end;height:52px}
.hm-col{display:flex;flex-direction:column;align-items:center;gap:2px;flex:1}
.hm-bar{width:100%;border-radius:3px 3px 0 0;transition:height .8s cubic-bezier(.4,0,.2,1),background .5s;min-height:2px;position:relative;overflow:hidden}
.hm-bar.done::after{content:'';position:absolute;inset:0;background:linear-gradient(90deg,transparent,rgba(255,255,255,.15),transparent);animation:shimmer 2.5s ease-in-out infinite}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.hm-lbl{font-size:6px;color:var(--muted)}
.hm-pct-lbl{font-size:6px;color:var(--muted2)}
.right-stats{display:flex;flex-direction:column;gap:7px;min-width:120px}
.rstat{background:var(--surface);border:1px solid var(--border);border-radius:10px;padding:7px 12px;backdrop-filter:blur(12px)}
.rstat-label{font-size:6px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:3px}
.rstat-val{font-family:'Cabinet Grotesk',sans-serif;font-size:19px;font-weight:800;line-height:1}
.sync-pill{position:fixed;top:14px;right:18px;display:flex;align-items:center;gap:5px;font-size:7px;color:var(--muted);letter-spacing:.1em;background:var(--surface);border:1px solid var(--border);border-radius:100px;padding:4px 10px 4px 7px;backdrop-filter:blur(8px);z-index:100}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);transition:all .3s}
.sync-pill.live .sync-dot{background:var(--c4);box-shadow:0 0 5px rgba(0,255,157,.6)}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.sync-pill.live .sync-dot{animation:pulse-dot 2s ease-in-out infinite}
#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;flex-direction:column;gap:14px;z-index:9999;transition:opacity .7s}
#loading.fade{opacity:0;pointer-events:none}
.l-ring{width:36px;height:36px;border-radius:50%;border:2px solid rgba(0,229,255,.2);border-top-color:var(--c0);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.l-txt{font-size:10px;color:var(--muted);letter-spacing:.12em}
</style>
</head>
<body>
<div class="bg-gradient"></div>
<div class="bg-grid"></div>
<div class="bg-scan"></div>
<div id="loading"><div class="l-ring"></div><div class="l-txt">syncing your progress...</div></div>
<div class="sync-pill" id="syncPill"><div class="sync-dot" id="syncDot"></div><span id="syncLabel">connecting</span></div>
<div class="wallpaper" id="wallpaper" style="opacity:0;transition:opacity .8s">
  <div class="top-bar">
    <div class="logo-name">ML / AI <span>Roadmap</span></div>
    <div class="center-stat">
      <div class="pct-glow"></div>
      <div class="overall-pct" id="w-pct">0%</div>
      <div class="overall-label">overall progress</div>
    </div>
    <div class="top-stats">
      <div class="tstat"><div class="tstat-val" id="w-hrs" style="color:var(--c0)">0h</div><div class="tstat-label">hours done</div></div>
      <div class="tstat"><div class="tstat-val" id="w-subtopics" style="color:var(--c1)">0/0</div><div class="tstat-label">subtopics</div></div>
      <div class="tstat"><div class="tstat-val" id="w-remaining" style="color:var(--c5)">0h</div><div class="tstat-label">remaining</div></div>
    </div>
  </div>
  <div class="sections-row" id="w-sections"></div>
  <div class="bottom-row">
    <div class="heatmap-card">
      <div class="hm-header">
        <div class="hm-title">Month-by-Month Completion</div>
        <div style="display:flex;gap:3px;align-items:center">
          <div style="width:8px;height:8px;border-radius:1px;background:var(--border)"></div>
          <div style="width:8px;height:8px;border-radius:1px;background:#1a4a1a"></div>
          <div style="width:8px;height:8px;border-radius:1px;background:#1a8a1a"></div>
          <div style="width:8px;height:8px;border-radius:1px;background:var(--c4)"></div>
          <span style="font-size:7px;color:var(--muted);margin-left:4px">0 to 100%</span>
        </div>
      </div>
      <div class="hm-bars" id="w-heatmap"></div>
    </div>
    <div class="right-stats">
      <div class="rstat"><div class="rstat-label">Active Sections</div><div class="rstat-val" id="w-active" style="color:var(--c3)">0</div></div>
      <div class="rstat"><div class="rstat-label">Completed</div><div class="rstat-val" id="w-completed" style="color:var(--c4)">0</div></div>
      <div class="rstat"><div class="rstat-label">Remaining</div><div class="rstat-val" id="w-left" style="color:var(--muted2)">0</div></div>
    </div>
  </div>
</div>

const SUB_LEVELS=[{key:'b',label:'Beginner',color:'#22c55e'},{key:'i',label:'Intermediate',color:'#f59e0b'},{key:'a',label:'Advanced',color:'#ec4899'}];
const SEC_ICONS={s0:'&#129518;',s1:'&#127794;',s2:'&#129504;',s3:'&#128172;',s4:'&#128640;',s5:'&#11088;'};

function subDataFor(secId,mi,ci){return SUBS[secId]&&SUBS[secId][mi]&&SUBS[secId][mi][ci]}
function subHours(secId,mi,ci){
  const sd=subDataFor(secId,mi,ci);
  const cp=SECTIONS.find(s=>s.id===secId).months[mi].checkpoints[ci];
  if(!sd) return [Math.round(cp.hours*.3),Math.round(cp.hours*.35),cp.hours-Math.round(cp.hours*.3)-Math.round(cp.hours*.35)];
  return [sd.b.h,sd.i.h,sd.a.h];
}
function secHours(secId,st){
  const sec=SECTIONS.find(s=>s.id===secId);let done=0,total=0;
  sec.months.forEach((m,mi)=>m.checkpoints.forEach((cp,ci)=>{
    const sh=subHours(secId,mi,ci);
    sh.forEach((h,si)=>{total+=h;if(st&&st[mi]&&st[mi].subs&&st[mi].subs[ci]&&st[mi].subs[ci][si])done+=h});
  }));
  return{done,total};
}
function secSubtopics(secId,st){
  const sec=SECTIONS.find(s=>s.id===secId);let done=0,total=0;
  sec.months.forEach((m,mi)=>m.checkpoints.forEach((_,ci)=>{
    total+=3;
    if(st&&st[mi]&&st[mi].subs&&st[mi].subs[ci])done+=st[mi].subs[ci].filter(Boolean).length;
  }));
  return{done,total};
}
function secPct(secId,st){const h=secHours(secId,st);return h.total===0?0:Math.round(h.done/h.total*100)}
function monthPct(secId,mi,st){
  const sec=SECTIONS.find(s=>s.id===secId);const m=sec.months[mi];let done=0,total=0;
  m.checkpoints.forEach((cp,ci)=>{
    const sh=subHours(secId,mi,ci);
    sh.forEach((h,si)=>{total+=h;if(st&&st[mi]&&st[mi].subs&&st[mi].subs[ci]&&st[mi].subs[ci][si])done+=h});
  });
  return total===0?0:Math.round(done/total*100);
}

(function(){
  const colors=['#00e5ff18','#7c3aed18','#00ff9d18','#f59e0b18','#ec489918'];
  for(let i=0;i<16;i++){
    const p=document.createElement('div');p.className='particle';
    const sz=Math.random()*2+1;
    p.style.cssText='width:'+sz+'px;height:'+sz+'px;background:'+colors[i%colors.length]+';left:'+Math.random()*100+'%;animation-duration:'+(Math.random()*25+20)+'s;animation-delay:'+(Math.random()*20)+'s';
    document.body.appendChild(p);
  }
})();

const CORE_MONTHS=[];
SECTIONS.filter(s=>!s.isBonus).forEach(sec=>{sec.months.forEach((_,mi)=>CORE_MONTHS.push({secId:sec.id,mi,color:sec.color}))});

function render(state){
  state=state||{};
  let totalHrsDone=0,totalHrsTotal=0,subtopicsDone=0,subtopicsTotal=0,activeSec=0,completedSec=0;
  const secRow=document.getElementById('w-sections');
  secRow.innerHTML='';
  SECTIONS.forEach(sec=>{
    const st=state[sec.id]||[];
    const pct=secPct(sec.id,st);
    const h=secHours(sec.id,st);
    const sub=secSubtopics(sec.id,st);
    totalHrsDone+=h.done;totalHrsTotal+=h.total;subtopicsDone+=sub.done;subtopicsTotal+=sub.total;
    if(pct===100)completedSec++;else if(pct>0)activeSec++;

    const segs=sec.months.map((_,mi)=>{
      const mp=monthPct(sec.id,mi,st);
      const bg=mp===0?'rgba(30,30,60,.5)':mp<100?sec.color+'88':sec.color;
      return '<div class="seg" style="background:'+bg+'"></div>';
    }).join('');

    const topicSubRows=[];
    sec.months.forEach((m,mi)=>{
      m.checkpoints.forEach((cp,ci)=>{
        const pips=SUB_LEVELS.map((l,li)=>{
          const done=st[mi]&&st[mi].subs&&st[mi].subs[ci]&&st[mi].subs[ci][li];
          return '<div class="spip" style="background:'+(done?l.color:l.color+'25')+'"></div>';
        }).join('');
        topicSubRows.push('<div class="topic-sub-row"><div class="topic-name-tiny">'+cp.topic+'</div><div class="sub-pips">'+pips+'</div></div>');
      });
    });

    const isDone=pct===100,isActive=pct>0&&!isDone;
    const glow=isDone?'0 0 20px '+sec.color+'55':isActive?'0 0 10px '+sec.color+'33':'none';
    const icon=SEC_ICONS[sec.id]||'&#128218;';

    secRow.innerHTML+='<div class="sec-card" style="border-color:'+(pct>0?sec.color+'44':'rgba(30,30,60,.5)')+'">'+
      '<div class="sec-accent" style="background:'+sec.color+';opacity:'+(pct>0?1:.2)+'"></div>'+
      '<div class="sec-icon">'+icon+'</div>'+
      '<div class="sec-tag" style="color:'+sec.color+'">'+sec.label+'</div>'+
      '<div class="sec-name-label">'+sec.months.length+' modules &middot; '+h.total+'h</div>'+
      '<div class="sec-pct" style="color:'+sec.color+';text-shadow:'+glow+'">'+pct+'%</div>'+
      '<div class="seg-track">'+segs+'</div>'+
      '<div class="topic-subs-wrap">'+topicSubRows.join('')+'</div>'+
      '<div class="sec-footer"><span style="color:'+sec.color+'99">'+h.done+'h done</span><span>'+(h.total-h.done)+'h left</span></div>'+
      '</div>';
  });

  const overallPct=totalHrsTotal===0?0:Math.round(totalHrsDone/totalHrsTotal*100);
  document.getElementById('w-pct').textContent=overallPct+'%';
  document.getElementById('w-hrs').textContent=totalHrsDone+'h';
  document.getElementById('w-remaining').textContent=(totalHrsTotal-totalHrsDone)+'h';
  document.getElementById('w-subtopics').textContent=subtopicsDone+'/'+subtopicsTotal;
  document.getElementById('w-active').textContent=activeSec;
  document.getElementById('w-completed').textContent=completedSec;
  document.getElementById('w-left').textContent=SECTIONS.length-completedSec;

  const hmEl=document.getElementById('w-heatmap');
  hmEl.innerHTML='';
  const maxBarH=50;
  CORE_MONTHS.forEach((cm,i)=>{
    const st=state[cm.secId]||[];
    const pct=monthPct(cm.secId,cm.mi,st);
    const barH=Math.max(2,Math.round(pct/100*maxBarH));
    const isDone=pct===100;
    const bg=pct===0?'rgba(26,26,53,.6)':pct<30?cm.color+'44':pct<70?cm.color+'88':pct<100?cm.color+'cc':cm.color;
    hmEl.innerHTML+='<div class="hm-col">'+
      '<div class="hm-pct-lbl">'+(pct>0?pct+'%':'')+'</div>'+
      '<div class="hm-bar'+(isDone?' done':'')+'" style="height:'+barH+'px;background:'+bg+';'+(isDone?'box-shadow:0 0 6px '+cm.color+'66':'')+'" title="Month '+(i+1)+': '+pct+'%"></div>'+
      '<div class="hm-lbl">M'+(i+1)+'</div></div>';
  });
}

    document.getElementById('loading').classList.add('fade');
    document.getElementById('wallpaper').style.opacity='1';
