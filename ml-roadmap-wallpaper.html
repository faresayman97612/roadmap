<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ML Roadmap — Wallpaper</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@300;400;500&family=Cabinet+Grotesk:wght@700;800;900&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#060610;--surface:rgba(12,12,26,0.7);--border:rgba(30,30,60,0.6);
  --text:#dde1f0;--muted:#484870;--muted2:#6868a0;
  --c0:#00e5ff;--c1:#7c3aed;--c2:#ec4899;--c3:#f59e0b;--c4:#00ff9d;--c5:#f97316;
}
html,body{width:100%;height:100%;overflow:hidden;background:var(--bg);font-family:'DM Mono',monospace}

/* ── Layered background ── */
.bg-layer{position:fixed;inset:0;pointer-events:none}

/* Deep space gradient */
.bg-gradient{
  background:
    radial-gradient(ellipse 80% 50% at 20% 30%, rgba(0,229,255,0.04) 0%, transparent 60%),
    radial-gradient(ellipse 60% 40% at 80% 70%, rgba(124,58,237,0.05) 0%, transparent 60%),
    radial-gradient(ellipse 50% 60% at 50% 50%, rgba(0,255,157,0.02) 0%, transparent 70%),
    #060610;
}

/* Animated grid */
.bg-grid{
  background-image:
    linear-gradient(rgba(0,229,255,0.03) 1px,transparent 1px),
    linear-gradient(90deg,rgba(0,229,255,0.03) 1px,transparent 1px);
  background-size:60px 60px;
  animation:gridshift 20s ease-in-out infinite alternate;
}
@keyframes gridshift{0%{background-position:0 0}100%{background-position:30px 30px}}

/* Scanlines */
.bg-scan{
  background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.03) 2px,rgba(0,0,0,0.03) 4px);
}

/* ── Particles ── */
.particle{position:fixed;border-radius:50%;pointer-events:none;animation:floatup linear infinite}
@keyframes floatup{0%{transform:translateY(105vh) scale(0) rotate(0deg);opacity:0}5%{opacity:1}90%{opacity:.4}100%{transform:translateY(-5vh) scale(1) rotate(360deg);opacity:0}}

/* ── Orbiting rings ── */
.ring{position:fixed;border-radius:50%;border:1px solid;pointer-events:none;animation:orbit linear infinite}
@keyframes orbit{from{transform:translate(-50%,-50%) rotate(0deg)}to{transform:translate(-50%,-50%) rotate(360deg)}}

/* ── Main layout ── */
.wallpaper{
  width:100vw;height:calc(100vh - 48px);
  display:grid;
  grid-template-rows:auto 1fr auto;
  padding:16px 26px 14px;
  gap:10px;
  position:relative;z-index:10;
  overflow:hidden;
}

/* ── TOP BAR ── */
.top-bar{display:flex;align-items:center;justify-content:space-between;gap:20px}

.logo-block{}
.logo-name{font-family:'Cabinet Grotesk',sans-serif;font-size:11px;font-weight:900;letter-spacing:.08em;color:var(--muted2);text-transform:uppercase}
.logo-name span{color:var(--c0)}

/* Big center stat */
.center-stat{text-align:center;position:relative}
.overall-pct{
  font-family:'Cabinet Grotesk',sans-serif;
  font-size:clamp(36px,5vw,62px);
  font-weight:900;letter-spacing:-.05em;line-height:1;
  color:var(--c4);
  text-shadow:0 0 60px rgba(0,255,157,.4),0 0 120px rgba(0,255,157,.15);
  position:relative;z-index:1;
}
.overall-label{font-size:9px;color:var(--muted);letter-spacing:.2em;text-transform:uppercase;margin-top:4px}

/* Glow ring behind pct */
.pct-glow{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:140px;height:140px;border-radius:50%;
  background:radial-gradient(circle,rgba(0,255,157,.08) 0%,transparent 70%);
  pointer-events:none;
}

.top-right-stats{display:flex;gap:12px}
.trs-box{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:8px 14px;text-align:right;
  backdrop-filter:blur(12px);
}
.trs-val{font-family:'Cabinet Grotesk',sans-serif;font-size:20px;font-weight:800;line-height:1}
.trs-label{font-size:7px;color:var(--muted);letter-spacing:.12em;text-transform:uppercase;margin-top:2px}

/* ── MIDDLE — Section cards ── */
.sections-row{
  display:grid;
  grid-template-columns:repeat(6,1fr);
  gap:10px;
  align-items:stretch;
  height:100%;
  min-height:0;
}

.sec-card{
  background:var(--surface);
  border:1px solid var(--border);
  border-radius:14px;
  padding:12px 12px 10px;
  backdrop-filter:blur(16px);
  display:flex;flex-direction:column;gap:6px;
  position:relative;overflow:hidden;
  transition:border-color .6s;
  height:100%;
  justify-content:flex-start;
}

/* Glow top edge */
.sec-card::before{
  content:'';position:absolute;
  top:0;left:10%;right:10%;height:1px;
  border-radius:1px;
  opacity:0;transition:opacity .6s;
}

.sec-card.active::before{opacity:1}

/* Left accent bar */
.sec-accent{position:absolute;left:0;top:8px;bottom:8px;width:2px;border-radius:1px}

.sec-tag{font-size:8px;letter-spacing:.14em;text-transform:uppercase;font-weight:600;padding-left:10px}
.sec-icon{font-size:22px;padding-left:10px;line-height:1;filter:drop-shadow(0 0 8px currentColor)}
.sec-name{font-family:'Cabinet Grotesk',sans-serif;font-size:clamp(10px,1vw,12px);font-weight:700;line-height:1.2;color:var(--muted2);padding-left:10px;margin-top:2px}
.sec-name{font-family:'Cabinet Grotesk',sans-serif;font-size:clamp(11px,1.2vw,14px);font-weight:800;line-height:1.2;color:var(--text);padding-left:10px}
.sec-pct{font-family:'Cabinet Grotesk',sans-serif;font-size:clamp(28px,3.2vw,42px);font-weight:900;line-height:1;padding-left:10px;margin-top:auto;margin-bottom:4px}

/* Segmented progress */
.seg-track{display:flex;gap:2px;padding:0 10px}
.seg{height:3px;border-radius:2px;flex:1;transition:background .5s}

.sec-footer{display:flex;justify-content:space-between;padding:0 10px;font-size:8px;color:var(--muted)}

/* Topic dots */
.topic-dots{display:flex;gap:2px;flex-wrap:wrap;padding:0 10px}
.tdot{width:6px;height:6px;border-radius:1px;transition:background .5s,box-shadow .5s}

/* ── BOTTOM ── */
.bottom-row{
  display:grid;
  grid-template-columns:1fr auto;
  gap:12px;
  align-items:end;
}

/* Heatmap */
.heatmap-card{
  background:var(--surface);border:1px solid var(--border);
  border-radius:12px;padding:10px 16px;
  backdrop-filter:blur(16px);
}
.hm-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:12px}
.hm-title{font-size:8px;letter-spacing:.16em;text-transform:uppercase;color:var(--muted)}
.hm-legend{display:flex;align-items:center;gap:6px;font-size:8px;color:var(--muted)}
.hm-legend-dots{display:flex;gap:2px}
.hm-leg-dot{width:8px;height:8px;border-radius:1px}

.hm-bars{display:flex;gap:8px;align-items:flex-end;height:52px}
.hm-col{display:flex;flex-direction:column;align-items:center;gap:3px;flex:1}
.hm-bar{
  width:100%;border-radius:3px 3px 0 0;
  transition:height .8s cubic-bezier(.4,0,.2,1),background .5s;
  min-height:2px;position:relative;overflow:hidden;
}
/* shimmer on complete bars */
.hm-bar.done::after{
  content:'';position:absolute;inset:0;
  background:linear-gradient(90deg,transparent 0%,rgba(255,255,255,.15) 50%,transparent 100%);
  animation:shimmer 2s ease-in-out infinite;
}
@keyframes shimmer{0%{transform:translateX(-100%)}100%{transform:translateX(100%)}}
.hm-lbl{font-size:7px;color:var(--muted);letter-spacing:.04em}
.hm-pct-lbl{font-size:7px;color:var(--muted2)}

/* Right mini stats */
.right-stats{display:flex;flex-direction:column;gap:8px;min-width:130px}
.rstat{
  background:var(--surface);border:1px solid var(--border);
  border-radius:10px;padding:7px 12px;
  backdrop-filter:blur(12px);
}
.rstat-label{font-size:7px;letter-spacing:.14em;text-transform:uppercase;color:var(--muted);margin-bottom:2px}
.rstat-val{font-family:'Cabinet Grotesk',sans-serif;font-size:18px;font-weight:800;line-height:1}

/* ── Sync indicator ── */
.sync-pill{
  position:fixed;top:16px;right:20px;
  display:flex;align-items:center;gap:5px;
  font-size:8px;color:var(--muted);letter-spacing:.1em;
  background:var(--surface);border:1px solid var(--border);
  border-radius:100px;padding:4px 10px 4px 7px;
  backdrop-filter:blur(8px);z-index:100;
}
.sync-dot{width:5px;height:5px;border-radius:50%;background:var(--muted);transition:all .3s}
.sync-pill.live .sync-dot{background:var(--c4);box-shadow:0 0 5px rgba(0,255,157,.6)}
@keyframes pulse-dot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.5;transform:scale(.7)}}
.sync-pill.live .sync-dot{animation:pulse-dot 2s ease-in-out infinite}

/* ── Loading ── */
#loading{
  position:fixed;inset:0;background:var(--bg);
  display:flex;align-items:center;justify-content:center;
  flex-direction:column;gap:14px;z-index:9999;
  transition:opacity .7s;
}
#loading.fade{opacity:0;pointer-events:none}
.l-ring{width:36px;height:36px;border-radius:50%;border:2px solid rgba(0,229,255,.2);border-top-color:var(--c0);animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.l-txt{font-size:10px;color:var(--muted);letter-spacing:.12em}
.l-sub{font-size:8px;color:var(--muted);opacity:.5}
</style>
</head>

<div class="bg-layer bg-gradient"></div>
<div class="bg-layer bg-grid"></div>
<div class="bg-layer bg-scan"></div>

<div id="loading">

          </div>
          <span>0 → 100%</span>
        </div>
      </div>
      <div class="hm-bars" id="w-heatmap"></div>
    </div>

    <div class="right-stats">
      <div class="rstat">
        <div class="rstat-label">Active Sections</div>
        <div class="rstat-val" id="w-active" style="color:var(--c3)">0</div>
      </div>
      <div class="rstat">
        <div class="rstat-label">Completed</div>
        <div class="rstat-val" id="w-completed" style="color:var(--c4)">0</div>
      </div>
      <div class="rstat">
        <div class="rstat-label">Sections Left</div>
        <div class="rstat-val" id="w-left" style="color:var(--muted2)">0</div>
      </div>
    </div>
  </div>
</div>

// ── Particles & effects ──────────────────────────
(function spawnParticles(){
  const colors=['#00e5ff22','#7c3aed22','#00ff9d22','#f59e0b22','#ec489922'];
  for(let i=0;i<20;i++){
    const p=document.createElement('div');p.className='particle';
    const sz=Math.random()*2+1;
    p.style.cssText=`width:${sz}px;height:${sz}px;background:${colors[i%colors.length]};left:${Math.random()*100}%;animation-duration:${Math.random()*25+20}s;animation-delay:${Math.random()*20}s`;
    document.body.appendChild(p);
  }
})();

// ── Computed helpers — IDENTICAL to main app ─────
function secHours(secId, st){
  const sec=SECTIONS.find(s=>s.id===secId);
  if(!st) return {done:0,total:0};
  let done=0,total=0;
  sec.months.forEach((m,mi)=>{
    m.checkpoints.forEach((cp,ci)=>{
      total+=cp.hours;
      if(st[mi]&&st[mi].checked&&st[mi].checked[ci]) done+=cp.hours;
    });
  });
  return{done,total};
}

function secChecked(secId, st){
  const sec=SECTIONS.find(s=>s.id===secId);
  if(!st) return{done:0,total:0};
  let done=0,total=0;
  sec.months.forEach((m,mi)=>{
    m.checkpoints.forEach((_,ci)=>{
      total++;
      if(st[mi]&&st[mi].checked&&st[mi].checked[ci]) done++;
    });
  });
  return{done,total};
}

function monthPct(secId, mi, st){
  const sec=SECTIONS.find(s=>s.id===secId);
  if(!st||!st[mi]) return 0;
  const m=sec.months[mi];
  let done=0,total=0;
  m.checkpoints.forEach((cp,ci)=>{
    total+=cp.hours;
    if(st[mi].checked&&st[mi].checked[ci]) done+=cp.hours;
  });
  return total===0?0:Math.round(done/total*100);
}

function secPct(secId, st){
  const h=secHours(secId,st);
  return h.total===0?0:Math.round(h.done/h.total*100);
}

// ── Core months for heatmap ───────────────────────
const CORE_MONTHS=[];
SECTIONS.filter(s=>!s.isBonus).forEach(sec=>{
  sec.months.forEach((_,mi)=>CORE_MONTHS.push({secId:sec.id,mi,color:sec.color}));
});

// ── Render ───────────────────────────────────────
function render(state){
  state=state||{};
  let totalHrsDone=0,totalHrsTotal=0,topicsDone=0,topicsTotal=0;
  let activeSec=0,completedSec=0;

  // Section cards
  const secRow=document.getElementById('w-sections');
  secRow.innerHTML='';
  const SEC_ICONS={s0:'🧮',s1:'🌲',s2:'🧠',s3:'💬',s4:'🚀',s5:'⭐'};
  const SEC_NAMES={s0:'Foundations',s1:'Classical ML',s2:'Deep Learning',s3:'LLMs & RAG',s4:'Production AI',s5:'Extras'};

  SECTIONS.forEach(sec=>{
    const st=state[sec.id]||[];
    const pct=secPct(sec.id,st);
    const h=secHours(sec.id,st);
    const c=secChecked(sec.id,st);
    totalHrsDone+=h.done;totalHrsTotal+=h.total;
    topicsDone+=c.done;topicsTotal+=c.total;
    if(pct===100)completedSec++;else if(pct>0)activeSec++;

    // Per-month segment bars
    const segs=sec.months.map((_,mi)=>{
      const mp=monthPct(sec.id,mi,st);
      const bg=mp===0?'rgba(30,30,60,.5)':mp<100?sec.color+'88':sec.color;
      return `<div class="seg" style="background:${bg}"></div>`;
    }).join('');

    // Topic dots
    const dots=[];
    sec.months.forEach((m,mi)=>{
      m.checkpoints.forEach((_,ci)=>{
        const done=st[mi]&&st[mi].checked&&st[mi].checked[ci];
        dots.push(`<div class="tdot" style="background:${done?sec.color:sec.color+'20'};${done?'box-shadow:0 0 4px '+sec.color+'88':''}" title="${m.checkpoints[ci]?.topic||''}"></div>`);
      });
    });

    const isActive=pct>0&&pct<100;
    const isDone=pct===100;
    const glowColor=isDone?'0 0 24px '+sec.color+'88':isActive?'0 0 12px '+sec.color+'44':'none';

    secRow.innerHTML+=`
      <div class="sec-card ${isActive?'active':''}" style="border-color:${pct>0?sec.color+'50':'rgba(30,30,60,.5)'};box-shadow:${pct>0?'inset 0 0 30px '+sec.color+'08':'none'}">
        <div class="sec-accent" style="background:${sec.color};opacity:${pct>0?1:.2}"></div>
        <div class="sec-icon" style="color:${sec.color}">${SEC_ICONS[sec.id]||'📚'}</div>
        <div class="sec-name">${SEC_NAMES[sec.id]||sec.label}</div>
        <div class="sec-tag" style="color:${sec.color};padding-left:10px;margin-top:2px">${sec.months.length} modules · ${h.total}h</div>
        <div class="sec-pct" style="color:${sec.color};text-shadow:${glowColor}">${pct}%</div>
        <div class="seg-track">${segs}</div>
        <div class="topic-dots">${dots.join('')}</div>
        <div class="sec-footer" style="margin-top:auto">
          <span style="color:${sec.color}88">${h.done}h done</span>
          <span>${h.total-h.done}h left</span>
        </div>
      </div>`;
  });

  // Global stats
  const overallPct=totalHrsTotal===0?0:Math.round(totalHrsDone/totalHrsTotal*100);
  document.getElementById('w-pct').textContent=overallPct+'%';
  document.getElementById('w-hrs-done').textContent=totalHrsDone+'h';
  document.getElementById('w-remaining').textContent=(totalHrsTotal-totalHrsDone)+'h';
  document.getElementById('w-topics').textContent=topicsDone+'/'+topicsTotal;
  document.getElementById('w-active').textContent=activeSec;
  document.getElementById('w-completed').textContent=completedSec;
  document.getElementById('w-left').textContent=SECTIONS.length-completedSec;

  // Heatmap bars
  const hmEl=document.getElementById('w-heatmap');
  hmEl.innerHTML='';
  const maxH=48;
  CORE_MONTHS.forEach((cm,i)=>{
    const st=state[cm.secId]||[];
    const pct=monthPct(cm.secId,cm.mi,st);
    const barH=Math.max(2,Math.round(pct/100*maxH));
    const isDone=pct===100;
    const bg=pct===0?'rgba(26,26,53,.6)':pct<30?cm.color+'44':pct<70?cm.color+'88':pct<100?cm.color+'cc':cm.color;
    hmEl.innerHTML+=`
      <div class="hm-col">
        <div class="hm-pct-lbl">${pct>0?pct+'%':''}</div>
        <div class="hm-bar ${isDone?'done':''}" style="height:${barH}px;background:${bg};${isDone?'box-shadow:0 0 8px '+cm.color+'66':''}" title="Month ${i+1}: ${pct}%"></div>
        <div class="hm-lbl">M${i+1}</div>
      </div>`;
  });
}

firebase.initializeApp(FB_CONFIG);
const db=firebase.database();

const syncLabel=document.getElementById('syncLabel');
const syncDot=document.getElementById('syncDot');

  else{syncPill.className='sync-pill';syncLabel.textContent='offline'}
});

let firstLoad=true;
db.ref(DB_PATH).on('value',snap=>{
  render(snap.val());
  if(firstLoad){
    firstLoad=false;
    const loading=document.getElementById('loading');
    const wp=document.getElementById('wallpaper');
    loading.classList.add('fade');
    wp.style.opacity='1';
    setTimeout(()=>loading.style.display='none',800);
  }
});
</script>
